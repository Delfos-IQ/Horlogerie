name = "horlogerie-api"
main = "index.js"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

# Environment variables are set in the Cloudflare dashboard
# Workers & Pages → horlogerie-api → Settings → Variables and Secrets
# Do NOT put your GROQ_API_KEY here — use the dashboard for secrets.

[vars]
# ALLOWED_ORIGIN = "https://yourusername.github.io"  # set this in dashboard too
